<!DOCTYPE html>

<head>

    <title>CrazyRat</title>
    <link rel="canonical" href="https://crazyrat.ninja/en/contact/">
    <link rel="alternate" hreflang="en" href="https://crazyrat.ninja/en/contact/">

</head>
<body>
    <p>Redirecting to <a href="/en/contact/">English version</a> / <a href="/pl/contact/">wersja polska</a></p>

        var lang = (navigator.languages && navigator.languages[0]) || navigator.language || '';
        window.location.replace(lang.toLowerCase().startsWith('pl') ? '/pl/contact/' : '/en/contact/');
    </script>
    <noscript><meta http-equiv="refresh" content="0; url=/en/contact/"></noscript>
</body>
